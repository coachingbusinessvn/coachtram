services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    # Tắt SSL/TLS trong môi trường dev để WP-CLI kết nối được
    command: --require-secure-transport=OFF --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12

  wordpress:
    image: wordpress:6.7-php8.2-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
      WORDPRESS_TABLE_PREFIX: wp_
      # DEV ONLY: disable the per-request pseudo-cron so the first page
      # load isn't slowed by overdue events. This is a seeding/export
      # environment (no scheduled posts). In PRODUCTION do NOT ship this
      # unless you replace it with a real system cron, e.g.:
      #   */5 * * * * curl -s https://site/wp-cron.php?doing_wp_cron >/dev/null
      WORDPRESS_CONFIG_EXTRA: |
        define('DISABLE_WP_CRON', true);
    volumes:
      - wp_data:/var/www/html
      - ./wp-theme/edina-tram-v2:/var/www/html/wp-content/themes/edina-tram-v2:ro
      - ./docker:/docker:ro

  # WP-CLI — dùng cho setup, seed, export. Không chạy liên tục.
  cli:
    image: wordpress:cli-php8.2
    user: "33:33"
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./wp-theme/edina-tram-v2:/var/www/html/wp-content/themes/edina-tram-v2:ro
      - ./docker:/docker:ro
      - ./docker/export:/export
      # Tắt SSL verification cho MySQL client (dev only)
      - ./docker/mysql-client.cnf:/etc/mysql/conf.d/client.cnf:ro

volumes:
  db_data:
  wp_data:
